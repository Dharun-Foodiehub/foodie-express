<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Express</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff5722;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

.nav-buttons button{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.login-btn{
background:white;
color:#ff5722;
}

.cart-btn{
background:black;
color:white;
}

.hero{
height:350px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
background-size:cover;
background-position:center;
color:white;
text-align:center;
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero input{
padding:12px;
width:300px;
border:none;
border-radius:5px;
}
.food-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.food-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.food-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.food-card h3,
.food-card p{
    padding:10px;
}
.food-card p{
padding:0 10px 10px;
font-weight:bold;
color:#ff5722;
}

.food-card button{
width:90%;
margin:10px;
padding:10px;
border:none;
background:#ff5722;
color:white;
cursor:pointer;
border-radius:5px;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 10px rgba(0,0,0,.2);
padding:20px;
transition:.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:20px;
}

.login-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:10px;
}

.login-box button{
width:100%;
padding:10px;
background:#ff5722;
color:white;
border:none;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

@media(max-width:768px){

.hero h1{
font-size:30px;
}

header{
padding:15px;
}

.hero input{
width:90%;
}

.cart{
width:100%;
}
}
</style>
</head>

<body>

<header>
<div class="logo">🍔 Foodie Express</div>

<div class="nav-buttons">
<button id="loginBtn" class="login-btn" onclick="openLogin()">
Login
</button>

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</button>
</div>
</header>

<section class="hero">
<h1>Order Delicious Food Online</h1>
<input
type="text"
id="searchInput"
placeholder="Search your favorite food"
onkeyup="searchFood()">
</section>
<section class="food-container" id="foodContainer">

    <!-- Burger -->
    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"
             alt="Burger">

        <h3>Burger</h3>
        <p>₹199</p>

        <button onclick="addToCart('Burger',199)">
            Add To Cart
        </button>
    </div>

    <!-- Pizza -->
    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500"
             alt="Pizza">

        <h3>Pizza</h3>
        <p>₹299</p>

        <button onclick="addToCart('Pizza',299)">
            Add To Cart
        </button>
    </div>

    <!-- Chicken -->
    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=500"
             alt="Chicken">

        <h3>Chicken</h3>
        <p>₹249</p>

        <button onclick="addToCart('Chicken',249)">
            Add To Cart
        </button>
    </div>

</section>
<div class="cart" id="cart">

<h2>🛒 Your Cart</h2>
<hr><br>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<br>
<input
id="address"
type="text"
placeholder="Enter Delivery Address"
style="width:100%;padding:10px;margin-bottom:10px;">

<p id="addressError"
style="color:red; font-size:14px; margin-top:5px;">
</p>
<input
id="mobile"
type="tel"
placeholder="Enter Mobile Number"
style="width:100%;padding:10px;margin-bottom:10px;">
<button onclick="placeOrder()"
style="width:100%;padding:12px;background:green;color:white;border:none;cursor:pointer;">
🚚 Deliver Here
</button>

<br><br>
<p style="font-size:14px; color:#555; text-align:center;">
⚠️ Only Cash On Delivery Acceptable
<br>
🚫 Returns Not Allowed
<br>
⚠️Must Login to Know Your Name
</p>

</div>

<div class="login-modal" id="loginModal">

<div class="login-box">
<span class="close" onclick="closeLogin()">✖</span>

<h2>Login</h2>

<input id="username" type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="loginSuccess()">Login</button>

</div>

</div>

<script>
   
async function loadFoods() {

    const response = await fetch("http://localhost:5000/foods");

    const foods = await response.json();

    let html = "";

    foods.forEach(food => {

        html += `
        <div class="food-card">
            <h3>${food.name}</h3>
            <p>₹${food.price}</p>
            <button>Add To Cart</button>
        </div>
        `;
    });

    document.getElementById("foodContainer").innerHTML = html;
}

// loadFoods();
let cart = [];

function addToCart(name, price){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        name:name,
        price:price
    });

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    document.getElementById("cartCount").innerText =
    cart.length;

    displayCart();
}
function displayCart(){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    let cartItems =
    document.getElementById("cartItems");

    cartItems.innerHTML = "";

    let total = 0;

    cart.forEach(item => {

        total += item.price;

        cartItems.innerHTML += `
        <div class="cart-item">
            <span>${item.name}</span>
            <span>₹${item.price}</span>
        </div>
        `;
    });

    document.getElementById("total").innerText = total;
}
async function toggleCart(){

document.getElementById("cart")
.classList.toggle("active");

const response =
await fetch("http://localhost:5000/cart");

cart = await response.json();

displayCart();

document.getElementById("cartCount").innerText =
cart.length;

}

function openLogin(){

document.getElementById("loginModal")
.style.display="flex";

}

function closeLogin(){

document.getElementById("loginModal")
.style.display="none";

}

function loginSuccess(){

    const username =
    document.getElementById("username").value;

    if(username.trim() === ""){
        alert("Enter Username");
        return;
    }

    document.getElementById("loginBtn").innerText =
    "👤 " + username;

    document.getElementById("loginBtn").disabled = true;

    closeLogin();

    alert("Login Successful ✅");


}

function placeOrder(){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){

        alert("🛒 Cart is Empty!\n\nRefresh the Page and add some Product...!");

        return;
    }

    localStorage.removeItem("cart");

    document.getElementById("cartCount").innerText = 0;

    displayCart();

    document.getElementById("cart").classList.remove("active");
    document.getElementById("address").value = "";
document.getElementById("mobile").value = "";
     alert("🎉 Order Placed Successfully!");

}
window.onload = function() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    document.getElementById("cartCount").innerText = cart.length;

    displayCart();

};
function searchFood() {

    let input =
    document.getElementById("searchInput")
    .value.toLowerCase();

    let cards =
    document.querySelectorAll(".food-card");

    cards.forEach(card => {

        let foodName =
        card.querySelector("h3")
        .innerText.toLowerCase();

        if(foodName.includes(input)){

            card.style.display = "block";

        } else {

            card.style.display = "none";

        }

    });

}
</script>

</body>
</html>
